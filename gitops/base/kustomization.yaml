apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: mario-base

resources:
  - deployment.yaml
  - service.yaml

commonLabels:
  app: mario
  managed-by: argocd

images:
  - name: mario-game
    newName: REPLACE_WITH_YOUR_ECR_URI
    newTag: latest

configMapGenerator:
  - name: mario-config
    literals:
      - APP_NAME=mario
      - ENVIRONMENT=base
