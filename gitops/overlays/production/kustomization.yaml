apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

bases:
  - ../../base

resources:
  - canary.yaml

patchesStrategicMerge:
  - deployment-patch.yaml

images:
  - name: mario-game
    newTag: v1.0.0

replicas:
  - name: mario-deployment
    count: 3

configMapGenerator:
  - name: mario-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
