name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: mario
  KUSTOMIZE_VERSION: 4.5.7

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner in repo mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run secret scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Validate Kubernetes manifests
      run: |
        kubectl kustomize gitops/base --enable-helm
        kubectl kustomize gitops/overlays/production --enable-helm
        kubectl kustomize gitops/overlays/dev --enable-helm
    
    - name: Validate with kubeval
      uses: instrumenta/kubeval-action@master
      with:
        files: gitops/base/

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [security-scan, lint-and-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    
    - name: Generate image tag
      id: image-tag
      run: |
        BRANCH=${GITHUB_REF#refs/heads/}
        if [ "$BRANCH" = "main" ]; then
          TAG="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
        else
          TAG="${BRANCH}-${GITHUB_SHA::7}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "full-image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$TAG" >> $GITHUB_OUTPUT
    
    - name: Build Docker image
      run: |
        docker build -t ${{ steps.image-tag.outputs.full-image }} .
    
    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.image-tag.outputs.full-image }}
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
    
    - name: Push image to ECR
      run: |
        docker push ${{ steps.image-tag.outputs.full-image }}
    
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ steps.image-tag.outputs.full-image }}
        format: spdx-json
        output-file: sbom.spdx.json
    
    - name: Upload SBOM
      uses: actions/upload-artifact@v3
      with:
        name: sbom
        path: sbom.spdx.json

  update-gitops:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Kustomize
      uses: imranismail/setup-kustomize@v2
      with:
        kustomize-version: ${{ env.KUSTOMIZE_VERSION }}
    
    - name: Update production image tag
      run: |
        cd gitops/overlays/production
        kustomize edit set image mario-game=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image-tag }}
    
    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gitops/overlays/production/kustomization.yaml
        git diff-index --quiet HEAD || git commit -m "chore: update production image to ${{ needs.build-and-push.outputs.image-tag }}"
        git push

  update-gitops-dev:
    name: Update GitOps Dev Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Kustomize
      uses: imranismail/setup-kustomize@v2
      with:
        kustomize-version: ${{ env.KUSTOMIZE_VERSION }}
    
    - name: Update dev image tag
      run: |
        cd gitops/overlays/dev
        kustomize edit set image mario-game=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image-tag }}
    
    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gitops/overlays/dev/kustomization.yaml
        git diff-index --quiet HEAD || git commit -m "chore: update dev image to ${{ needs.build-and-push.outputs.image-tag }}"
        git push
